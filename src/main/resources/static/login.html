<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Tema claro por defecto -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar — MegaSOAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/site.css">
    <style>
        /* Topbar minimalista para login */
        .login-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 36px;
            height: 58px;
            background: var(--topbar-bg);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border-bottom: 1px solid var(--topbar-border);
            transition: background .28s, border-color .28s;
        }
        .login-topbar .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            font-size: .85rem;
            font-weight: 500;
            transition: color .2s;
        }
        .back-link:hover { color: var(--text); }

        /* Centrado vertical completo */
        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Card de login */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 40px 36px;
            box-shadow:
                0 0 0 1px rgba(var(--accent-rgb),0.06),
                0 24px 64px rgba(0,0,0,0.18);
            transition: background .28s, border-color .28s;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -80px; right: -80px;
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(var(--accent-rgb),0.10), transparent 65%);
            pointer-events: none;
        }

        /* Logo en card */
        .login-logo {
            text-align: center;
            margin-bottom: 6px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
        }
        .login-logo span { color: var(--accent); }
        .login-subtitle {
            text-align: center;
            color: var(--muted);
            font-size: .85rem;
            margin-bottom: 28px;
        }

        /* Inputs mejorados */
        .login-field {
            margin-bottom: 14px;
        }
        .login-field input#captchaAnswer {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 10px;
        padding: 12px 16px;
        color: var(--text);
        font-size: .95rem;
        font-family: inherit;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
        }
         .login-field input#captchaAnswer:focus {
        border-color: rgba(var(--accent-rgb),0.5);
        box-shadow: 0 0 0 3px rgba(var(--accent-rgb),0.08);
         }

        .login-field label {
            display: block;
            font-size: .75rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 7px;
        }
        .login-field input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: .95rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .login-field input:focus {
            border-color: rgba(var(--accent-rgb),0.5);
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb),0.08);
        }

        /* Captcha */
        .captcha-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }
        .captcha-display {
            flex: 1;
            padding: 11px 16px;
            border-radius: 10px;
            border: 1px solid rgba(var(--accent-rgb),0.2);
            background: rgba(var(--accent-rgb),0.05);
            color: var(--accent);
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
        }
        .btn-refresh {
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            color: var(--muted);
            padding: 11px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: .9rem;
            transition: all .2s;
            white-space: nowrap;
        }
        .btn-refresh:hover { background: var(--input-bg); color: var(--text); }

        /* Botón login */
        .btn-login {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 14px;
            font-size: .97rem;
            border-radius: 10px;
            margin-top: 4px;
        }

        /* Tema claro — ajustes de la card */
        [data-theme="light"] .login-card {
            background: #ffffff;
            box-shadow: 0 4px 32px rgba(0,0,0,0.10), 0 0 0 1px rgba(var(--accent-rgb),0.08);
        }
        [data-theme="light"] .login-topbar .back-link { color: var(--muted); }

        /* Mensaje de estado */
        .login-message {
            margin-top: 14px;
            text-align: center;
            font-size: .87rem;
            min-height: 20px;
            transition: all .2s;
        }
        .login-message.error   { color: var(--danger); }
        .login-message.success { color: var(--accent); }

        /* Modal sesión activa */
        .session-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .session-overlay.visible { display: flex; }
        .session-modal {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 36px 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
        }
        .session-modal .modal-icon {
            font-size: 2.4rem;
            margin-bottom: 12px;
        }
        .session-modal h3 {
            margin: 0 0 8px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }
        .session-modal p {
            color: var(--muted);
            font-size: .88rem;
            margin: 0 0 24px;
            line-height: 1.5;
        }
        .session-modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-modal-cancel {
            flex: 1;
            padding: 11px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: transparent;
            color: var(--muted);
            font-size: .9rem;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-modal-cancel:hover { background: var(--input-bg); color: var(--text); }
        .btn-modal-confirm {
            flex: 1;
            padding: 11px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: #000;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn-modal-confirm:hover { opacity: .85; }

        /* Divider + link */
        .login-footer {
            text-align: center;
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
            font-size: .83rem;
            color: var(--muted);
        }
        .login-footer a { color: var(--accent); }
    </style>
</head>
<body class="login-page">

    <!-- Topbar minimalista: logo + toggle tema + volver -->
    <header class="login-topbar">
        <a href="/" class="brand" style="text-decoration:none"><div class="brand-icon">MS</div>Mega<span>SOAT</span></a>
        <div class="nav-right">
            <a href="/" class="back-link">← Volver al inicio</a>
        </div>
    </header>

    <!-- Modal: cuenta ya en uso -->
    <div class="session-overlay" id="sessionOverlay">
        <div class="session-modal">
            <div class="modal-icon">📱</div>
            <h3>Cuenta en uso</h3>
            <p>Esta cuenta ya tiene una sesión activa en otro dispositivo.<br>
               ¿Deseas continuar aquí y cerrar la otra sesión?</p>
            <div class="modal-actions">
                <button class="btn-modal-cancel" id="modalCancel">Cancelar</button>
                <button class="btn-modal-confirm" id="modalConfirm">Continuar aquí</button>
            </div>
        </div>
    </div>

    <!-- Contenido centrado -->
    <div class="login-center">
        <div class="login-card">

            <div class="login-logo">Mega<span>SOAT</span></div>
            <p class="login-subtitle">Portal empresarial · Acceso seguro</p>

            <div class="login-field">
                <label>Correo electrónico</label>
                <input id="email" type="email" 
                       autocomplete="email">
            </div>

            <div class="login-field">
                <label>Contraseña</label>
                <input id="password" type="password" 
                       autocomplete="current-password">
            </div>

            <div class="login-field">
                <label for="captchaAnswer">Código de verificación</label>
                <div class="captcha-row">
                    <div class="captcha-display" id="captchaCode"></div>
                    <button class="btn-refresh" id="refreshCaptcha" type="button">↻ Nuevo</button>
                </div>
                <!-- Campo de texto con mismo diseño que usuario/contraseña -->
                <input id="captchaAnswer" type="text" placeholder="Ingrese el código" required>
                <input type="hidden" id="captchaId" name="captchaId" value="">
            </div>



            <button id="loginButton" class="primary-button btn-login">Iniciar sesión</button>

            <div id="message" class="login-message"></div>

            <div class="login-footer">
                ¿Necesitas verificar tu SOAT? <a href="/portal.html">Búscalo aquí</a>
            </div>
        </div>
    </div>

    <script src="/js/animations.js" defer></script>
    <script>
        const button    = document.getElementById('loginButton');
        const captchaCode = document.getElementById('captchaCode');
        const refreshBtn  = document.getElementById('refreshCaptcha');
        const messageEl   = document.getElementById('message');
        const overlay     = document.getElementById('sessionOverlay');
        let captchaId = null;
        let pendingEmail = null;
        let pendingPassword = null;

        async function loadCaptcha() {
            try {
                const r = await fetch('/api/auth/captcha');
                if (!r.ok) throw new Error();
                const j = await r.json();
                captchaId = j.id;
                captchaCode.textContent = j.question;
                document.getElementById('captchaAnswer').value = '';
            } catch(e) { captchaId = null; }
        }

        loadCaptcha();
        refreshBtn.addEventListener('click', e => { e.preventDefault(); loadCaptcha(); });

        function saveSessionAndRedirect(body) {
            localStorage.setItem('megaSoatToken', body.token);
            localStorage.setItem('megaSoatUser', body.email);
            showMsg('✓ Acceso concedido', 'success');
            setTimeout(() => { window.location.href = '/dashboard.html'; }, 500);
        }

        button.addEventListener('click', async () => {
            messageEl.textContent = '';
            messageEl.className = 'login-message';
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const captchaAnswer = document.getElementById('captchaAnswer').value.trim();
            if (!email || !password) { showMsg('Completa todos los campos', 'error'); return; }
            if (!captchaAnswer)      { showMsg('Ingresa el código de verificación', 'error'); return; }

            button.textContent = 'Verificando...';
            button.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, captchaId, captchaAnswer })
                });

                if (res.status === 409) {
                    // Cuenta activa en otro dispositivo → mostrar modal
                    pendingEmail    = email;
                    pendingPassword = password;
                    overlay.classList.add('visible');
                    button.textContent = 'Iniciar sesión';
                    button.disabled = false;
                    return;
                }
                if (!res.ok) {
                    if (res.status === 400) throw new Error('Captcha expirado — toca ↻ Nuevo');
                    if (res.status === 401) throw new Error('Correo o contraseña incorrectos');
                    throw new Error('Error de autenticación');
                }
                saveSessionAndRedirect(await res.json());
            } catch(err) {
                showMsg(err.message || 'Error de autenticación', 'error');
                button.textContent = 'Iniciar sesión';
                button.disabled = false;
                loadCaptcha();
            }
        });

        // Modal: cancelar
        document.getElementById('modalCancel').addEventListener('click', () => {
            overlay.classList.remove('visible');
            pendingEmail = pendingPassword = null;
            loadCaptcha();
        });

        // Modal: continuar aquí (force-login, sin captcha)
        document.getElementById('modalConfirm').addEventListener('click', async () => {
            overlay.classList.remove('visible');
            button.textContent = 'Ingresando...';
            button.disabled = true;

            try {
                const res = await fetch('/api/auth/force-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, password: pendingPassword })
                });

                if (!res.ok) {
                    showMsg('Error al reconectar. Intenta de nuevo.', 'error');
                    button.textContent = 'Iniciar sesión';
                    button.disabled = false;
                    loadCaptcha();
                    return;
                }
                saveSessionAndRedirect(await res.json());
            } catch(e) {
                showMsg('Error de red. Intenta de nuevo.', 'error');
                button.textContent = 'Iniciar sesión';
                button.disabled = false;
                loadCaptcha();
            }
        });

        document.getElementById('password').addEventListener('keyup', e => {
            if (e.key === 'Enter') button.click();
        });

        function showMsg(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'login-message ' + type;
        }
    </script>
</body>
</html>
