<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('megaSoatTheme')||'dark')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking — MegaSOAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body data-requires-auth="true">
    <header class="topbar">
        <div class="brand"><div class="brand-icon">MS</div>Mega<span>SOAT</span></div>
        <div class="nav-sep"></div>
        <nav class="nav-links">
            <a href="/">Inicio</a>
            <a href="/portal.html">Verificar SOAT</a>
            <a href="/ranking.html">Ranking</a>
            <a href="/observatorio.html">Observatorio</a>
            <a href="/dashboard.html" class="nav-auth" style="display:none">Panel de control</a>
            <a href="/admin.html" class="nav-auth" style="display:none">Administración</a>
        </nav>
        <div class="nav-right">
            <a href="/login" class="btn-nav-login nav-guest">Ingresar</a>
            <div class="user-chip nav-auth" style="display:none">
                <strong id="userLabel">—</strong>
                <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="margin-bottom:24px">
            <h1 style="font-size:1.8rem;color:var(--text)">Top Puntos de Venta</h1>
            <p style="color:var(--muted);font-size:.95rem">Ranking mensual por volumen de ventas y cumplimiento. Datos en tiempo real.</p>
        </div>

        <!-- Stats overview -->
        <div class="stats" id="stats" style="margin-bottom:28px"></div>

        <!-- Podio top 3 -->
        <div id="podium" style="display:flex;justify-content:center;align-items:flex-end;gap:16px;margin-bottom:32px;min-height:140px"></div>

        <!-- Full ranking table -->
        <div class="panel" style="padding:0;overflow:hidden">
            <div style="padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center">
                <h2 style="font-size:1.1rem;font-weight:600">Clasificación completa</h2>
                <button class="btn-secondary btn-sm" onclick="loadRanking()">↻ Actualizar</button>
            </div>
            <div class="table-wrap">
                <table class="table" id="rankingTable">
                    <thead>
                        <tr>
                            <th style="width:60px">Pos.</th>
                            <th>Punto de Venta</th>
                            <th>Ciudad</th>
                            <th>SOAT vendidos</th>
                            <th>Desempeño</th>
                            <th>Morosidad</th>
                        </tr>
                    </thead>
                    <tbody><tr><td colspan="6" class="alert-empty">Cargando...</td></tr></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/js/animations.js" defer></script>
    <script>
        const rankColors = ['#f5b942', '#b9c2cf', '#cd7f32'];

        function delinquencyClass(d) { return d >= 10 ? 'high' : d >= 5 ? 'medium' : 'low'; }

        function rankBadge(rank) {
            const color = rankColors[rank - 1] || 'var(--muted)';
            const bg = rank <= 3 ? `rgba(255,255,255,0.04)` : 'transparent';
            return `<span style="display:inline-flex;align-items:center;justify-content:center;min-width:1.9rem;height:1.9rem;padding:0 .45rem;border-radius:999px;border:1px solid ${rank <= 3 ? color : 'rgba(255,255,255,0.12)'};background:${bg};color:${color};font-weight:800;font-size:.92rem;line-height:1">${rank}</span>`;
        }

        function performanceScore(item) {
            // Score: more sales = better, lower delinquency = better
            const salesScore = Math.min(item.sales / 10, 100);
            const delinquencyPenalty = Math.min(item.delinquency * 2, 50);
            return Math.max(0, salesScore - delinquencyPenalty);
        }

        function renderProgressBar(score) {
            const pct = Math.min(Math.round(score), 100);
            const cls = pct >= 70 ? '' : pct >= 40 ? 'medium' : 'high';
            return `<div class="progress-bar-wrap"><div class="progress-bar ${cls}" style="width:${pct}%"></div></div> <span style="font-size:.8rem;color:var(--muted);margin-left:6px">${pct}</span>`;
        }

        async function loadRanking() {
            try {
                const token = localStorage.getItem('megaSoatToken');
                const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
                const res = await fetch('/api/dashboard/ranking', { headers });
                const data = await res.json();

                // Stats
                const totalSales = data.reduce((s,i) => s + i.sales, 0);
                const avgMorosidad = data.length ? (data.reduce((s,i) => s + i.delinquency, 0) / data.length) : 0;
                const topSeller = data[0]?.name || '—';

                document.getElementById('stats').innerHTML = `
                    <div class="card accent-border"><h2>Total SOAT vendidos</h2><strong>${totalSales.toLocaleString()}</strong><small>entre todos los PV</small></div>
                    <div class="card"><h2>Puntos de venta</h2><strong>${data.length}</strong><small>en el ranking</small></div>
                    <div class="card warn-border"><h2>Morosidad promedio</h2><strong>${avgMorosidad.toFixed(1)}%</strong><small>del sistema</small></div>
                    <div class="card info-border"><h2>Líder</h2><strong style="font-size:1.2rem">${topSeller}</strong><small>mayor volumen de ventas</small></div>
                `;

                // Podium (top 3)
                const podiumEl = document.getElementById('podium');
                const top3 = data.slice(0, 3);
                if (top3.length >= 3) {
                    const displayOrder = [top3[1], top3[0], top3[2]]; // 2nd, 1st, 3rd
                    const displayHeights = ['90px','120px','70px'];
                    podiumEl.innerHTML = displayOrder.map((item, vi) => `
                        <div style="text-align:center;flex:1;max-width:200px">
                            <div style="display:flex;justify-content:center;margin-bottom:8px">${rankBadge([2,1,3][vi])}</div>
                            <div style="font-weight:700;color:var(--text);font-size:.92rem;margin-bottom:4px">${item.name}</div>
                            <div style="font-size:.8rem;color:var(--muted);margin-bottom:10px">${item.city}</div>
                            <div style="background:rgba(6,182,212,${vi===1?'0.25':'0.12'});border:1px solid rgba(6,182,212,0.2);border-radius:10px 10px 0 0;height:${displayHeights[vi]};display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px">
                                <span style="font-size:1.2rem;font-weight:700;color:var(--accent)">${item.sales}</span>
                            </div>
                        </div>`).join('');
                } else {
                    podiumEl.style.display = 'none';
                }

                // Full table
                const tbody = document.querySelector('#rankingTable tbody');
                tbody.innerHTML = data.map((item, i) => {
                    const score = performanceScore(item);
                    const rank = item.position || (i + 1);
                    return `<tr>
                        <td style="text-align:center">
                            ${i < 3 ? rankBadge(rank) : `<strong style="color:var(--muted)">#${rank}</strong>`}
                        </td>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.city}</td>
                        <td><strong style="color:var(--accent)">${item.sales}</strong></td>
                        <td>${renderProgressBar(score)}</td>
                        <td><span class="badge ${delinquencyClass(item.delinquency)}">${item.delinquency.toFixed(1)}%</span></td>
                    </tr>`;
                }).join('');

            } catch(e) {
                console.error(e);
                document.querySelector('#rankingTable tbody').innerHTML = '<tr><td colspan="6" class="alert-empty">Error al cargar datos</td></tr>';
            }
        }

        loadRanking();
    </script>
</body>
</html>
