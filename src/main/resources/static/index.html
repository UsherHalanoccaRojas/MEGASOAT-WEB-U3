<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Tema claro por defecto -->
    <title>MegaSOAT Web</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">Mega<span>SOAT</span></div>
        <div class="nav-sep"></div>
        <nav class="nav-links">
            <a href="/">Inicio</a>
<a href="/ranking.html">Ranking</a>
            <a href="/observatorio.html">Observatorio</a>
            <a href="/dashboard.html" class="nav-auth" style="display:none">Panel de control</a>
            <a href="/admin.html" class="nav-auth" style="display:none">Administración</a>
        </nav>
        <div class="nav-right">
            <a href="/login" class="btn-nav-login nav-guest">Ingresar</a>
            <div class="user-chip nav-auth" style="display:none">
                <strong id="userLabel">—</strong>
                <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            </div>
        </div>
    </header>

    <section class="hero" style="min-height:calc(100vh - 88px);display:flex;align-items:center;justify-content:center;padding:32px 20px 18px;">
        <div class="panel fade-in-up" role="main" style="max-width:860px;width:100%;text-align:center;padding:44px 36px">
            <div style="display:inline-flex;align-items:center;justify-content:center;background:var(--modal-bg);border:1px solid var(--card-border);border-radius:18px;padding:18px 28px;box-shadow:0 18px 40px rgba(0,0,0,.25);margin-bottom:18px">
                <h1 style="margin:0;font-size:clamp(3rem,8vw,5.6rem);line-height:1;font-weight:900;letter-spacing:-0.04em">
                    <span style="color:var(--text)">Mega</span><span style="color:var(--accent)">SOAT</span>
                </h1>
            </div>
            <p class="lead" style="max-width:760px;font-size:1.08rem;margin:0 auto">
                Plataforma web para consultar y controlar información de pólizas SOAT.
            </p>
        </div>
    </section>

    <script src="/js/animations.js" defer></script>
</body>
</html>
