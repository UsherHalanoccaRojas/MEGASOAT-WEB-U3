<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio - MegaSOAT</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">MegaSOAT</div>
        <nav class="nav-links"><a href="/">Inicio</a><a href="/ranking.html">Ranking</a><span id="navAuth"><a href="/login">Login</a></span></nav>
    </header>
    <main class="container">
        <div class="panel">
            <section class="hero">
                <div>
                    <h1>Observatorio de Riesgos</h1>
                    <p class="lead">Monitorea los puntos de venta con mayor morosidad y visualiza alertas por región.</p>
                    <div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap">
                      <span class="badge low"><span></span>Bajo</span>
                      <span class="badge medium"><span></span>Medio</span>
                      <span class="badge high"><span></span>Alto</span>
                    </div>
                </div>
            </section>

            <div class="map-card" style="margin-top:18px">
                <h2>Mapa de morosidad</h2>
                <div id="map" class="map"></div>
            </div>

            <div class="panel" id="alertsPanel" style="margin-top:18px">
                <h2>Alertas de riesgo</h2>
                <div id="alerts"></div>
            </div>
        </div>
    </main>
    <script src="/js/animations.js" defer></script>
    <script src="/js/nav-auth.js" defer></script>
    <script>
        const coordinates = {
            "Lima": {x: 60, y: 160},
            "Arequipa": {x: 50, y: 300},
            "Tacna": {x: 50, y: 340},
            "Cali": {x: 240, y: 220},
            "Bogotá": {x: 330, y: 120},
            "Medellín": {x: 320, y: 100},
            "Barranquilla": {x: 360, y: 70},
            "Santa Marta": {x: 365, y: 55},
            "Villavicencio": {x: 350, y: 140},
            "Pasto": {x: 290, y: 300}
        };

        function buildAlert(point) {
            const el = document.createElement('div');
            el.className = 'alert';
            el.innerHTML = `<strong>${point.name} (${point.city})</strong><p>SOAT vendidos: ${point.sales} · Morosidad: ${point.delinquency.toFixed(1)}%</p>`;
            return el;
        }

        async function loadMap() {
            const headers = {};
            const token = localStorage.getItem('megaSoatToken');
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const response = await fetch('/api/dashboard/map', { headers });
            const data = await response.json();
            const map = document.getElementById('map');
            const alerts = document.getElementById('alerts');
            map.innerHTML = '';
            alerts.innerHTML = '';

            data.forEach(point => {
                const marker = document.createElement('div');
                const coords = coordinates[point.city] || {x: 200, y: 200};
                marker.className = `marker risk-${point.risk}`;
                marker.style.left = `${coords.x}px`;
                marker.style.top = `${coords.y}px`;
                marker.title = `${point.name} · ${point.city} · ${point.delinquency}%`;
                marker.innerHTML = '<span></span>';
                map.appendChild(marker);
                if (point.risk !== 'bajo') {
                    alerts.appendChild(buildAlert(point));
                }
            });
        }

        loadMap().catch(console.error);
    </script>
</body>
</html>
