<!DOCTYPE html>
<html lang="es">
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - MegaSOAT</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">MegaSOAT</div>
        <nav class="nav-links"><a href="/">Inicio</a><a href="/observatorio.html">Observatorio</a><span id="navAuth"><a href="/login">Login</a></span></nav>
    </header>
    <main class="container">
        <div class="panel">
            <section class="hero">
                <div>
                    <h1>Top Puntos de Venta</h1>
                    <p class="lead">Ranking mensual por volumen de ventas y morosidad. Estos datos se extraen del portal de ventas y se muestran en tiempo real.</p>
                </div>
            </section>

            <div class="stats" id="stats"></div>

            <div style="overflow:auto;margin-top:18px;">
              <table class="table" id="rankingTable">
                  <thead>
                      <tr>
                          <th>Posición</th>
                          <th>Punto de Venta</th>
                          <th>Ciudad</th>
                          <th>SOAT vendidos</th>
                          <th>Morosidad</th>
                      </tr>
                  </thead>
                  <tbody></tbody>
              </table>
            </div>
        </div>
    </main>
    <script src="/js/animations.js" defer></script>
    <script src="/js/nav-auth.js" defer></script>
    <script>
        const rankColors = ['#f5b942', '#b9c2cf', '#cd7f32'];

        const badgeClass = ratio => ratio >= 5 ? 'high' : ratio >= 3 ? 'medium' : 'low';

        const rankBadge = rank => {
            const color = rankColors[rank - 1] || 'var(--muted)';
            const border = rank <= 3 ? color : 'rgba(255,255,255,0.12)';
            return `<span style="display:inline-flex;align-items:center;justify-content:center;min-width:1.9rem;height:1.9rem;padding:0 .45rem;border-radius:999px;border:1px solid ${border};background:rgba(255,255,255,0.04);color:${color};font-weight:800;font-size:.92rem;line-height:1">${rank}</span>`;
        };

        async function loadRanking() {
            const response = await fetch('/api/dashboard/ranking');
            const data = await response.json();
            const tbody = document.querySelector('#rankingTable tbody');
            const stats = document.getElementById('stats');
            tbody.innerHTML = '';
            stats.innerHTML = '';

            let totalSales = 0;
            let totalMorosidad = 0;
            data.forEach(item => {
                totalSales += item.sales;
                totalMorosidad += item.delinquency;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="text-align:center">${rankBadge(item.position || (tbody.children.length + 1))}</td>
                    <td>${item.name}</td>
                    <td>${item.city}</td>
                    <td>${item.sales}</td>
                    <td><span class="badge ${badgeClass(item.delinquency)}">${item.delinquency.toFixed(1)}%</span></td>
                `;
                tbody.appendChild(row);
            });

            const average = data.length ? (totalMorosidad / data.length).toFixed(1) : '0.0';
            stats.innerHTML = `
                <div class="card"><h2>Total SOAT vendidos</h2><strong>${totalSales}</strong></div>
                <div class="card"><h2>Morosidad promedio</h2><strong>${average}%</strong></div>
                <div class="card"><h2>Puntos de venta activos</h2><strong>${data.length}</strong></div>
            `;
        }

        loadRanking().catch(console.error);
    </script>
</body>
</html>
