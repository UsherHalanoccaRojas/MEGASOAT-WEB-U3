<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <!-- Tema claro por defecto -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar — MegaSOAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/site.css">
        <style>
        .login-topbar { display: flex; justify-content: space-between; align-items: center; padding: 0 36px; height: 58px; background: var(--topbar-bg); border-bottom: 1px solid var(--topbar-border); }
        .login-topbar .nav-right { display: flex; align-items: center; gap: 10px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: .85rem; font-weight: 500; }
        .back-link:hover { color: var(--text); }
        .login-page { min-height: 100vh; display: flex; flex-direction: column; }
        .login-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 420px; background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 18px; padding: 40px 36px; box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.06), 0 8px 24px rgba(0, 0, 0, 0.08); }
        .login-logo { text-align: center; margin-bottom: 6px; font-size: 1.5rem; font-weight: 800; color: var(--text); }
        .login-logo span { color: var(--accent); }
        .login-subtitle { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 28px; }
        .login-field { margin-bottom: 14px; }
        .login-field label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
        .login-field input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: .95rem; font-family: inherit; outline: none; }
        .login-field input:focus { border-color: rgba(var(--accent-rgb), 0.5); box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.08); }
        .captcha-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
        .captcha-display { flex: 1; padding: 11px 16px; border-radius: 10px; border: 1px solid rgba(var(--accent-rgb), 0.2); background: rgba(var(--accent-rgb), 0.05); color: var(--accent); text-align: center; font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 4px; }
        .btn-refresh { background: var(--chip-bg); border: 1px solid var(--chip-border); color: var(--muted); padding: 11px 16px; border-radius: 10px; cursor: pointer; font-size: .9rem; white-space: nowrap; }
        .btn-refresh:hover { background: var(--input-bg); color: var(--text); }
        .btn-login { width: 100%; display: flex; justify-content: center; align-items: center; text-align: center; padding: 14px; font-size: .97rem; border-radius: 10px; margin-top: 4px; }
        [data-theme="light"] .login-card { background: #ffffff; box-shadow: 0 4px 32px rgba(0, 0, 0, 0.10), 0 0 0 1px rgba(var(--accent-rgb), 0.08); }
        [data-theme="light"] .login-topbar .back-link { color: var(--muted); }
        .login-message { margin-top: 14px; text-align: center; font-size: .87rem; min-height: 20px; }
        .login-message.error { color: var(--danger); }
        .login-message.success { color: var(--accent); }
    </style>
</head>

<body class="login-page">

    <!-- Topbar minimalista: logo + toggle tema + volver -->
    <header class="login-topbar">
        <a href="/" class="brand" style="text-decoration:none">Mega<span>SOAT</span></a>
        <div class="nav-right">
            <a href="/" class="back-link">← Volver al inicio</a>
        </div>
    </header>



    <!-- Contenido centrado -->
    <div class="login-center">
        <div class="login-card">

            <div class="login-logo">Mega<span>SOAT</span></div>
            <p class="login-subtitle">Hola Bienvenido · Inicia Sesion</p>

            <div class="login-field">
                <label>Correo electrónico</label>
                <input id="email" type="email" autocomplete="email">
            </div>

            <div class="login-field">
                <label>Contraseña</label>
                <input id="password" type="password" autocomplete="current-password">
            </div>

            <div class="login-field">
                <label for="captchaAnswer">Código de verificación</label>
                <div class="captcha-row">
                    <div class="captcha-display" id="captchaCode"></div>
                    <button class="btn-refresh" id="refreshCaptcha" type="button">↻ Nuevo</button>
                </div>
                <!-- Campo de texto con mismo diseño que usuario/contraseña -->
                <input id="captchaAnswer" type="text" placeholder="Ingrese el código" required>
                <input type="hidden" id="captchaId" name="captchaId" value="">
            </div>

            <button id="loginButton" class="primary-button btn-login">Iniciar sesión</button>

            <div id="message" class="login-message"></div>
        </div>
    </div>
    <script src="/js/animations.js" defer></script>
    <script>
        function decodeRoles(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                const rolesVal = payload.roles || '';
                return Array.isArray(rolesVal) ? rolesVal : String(rolesVal).split(',').map(r => r.trim()).filter(Boolean);
            } catch(e) { return []; }
        }

        function getLandingPage(token) {
            const roles = decodeRoles(token);
            if (roles.includes('ROLE_SUPERADMIN') || roles.includes('SUPERADMIN') || roles.includes('ROLE_ADMIN') || roles.includes('ADMIN')) {
                return '/observatorio.html';
            }
            return '/ranking.html'; // COMERCIAL
        }

        const currentToken = localStorage.getItem('megaSoatToken');
        if (currentToken) {
            window.location.replace(getLandingPage(currentToken));
        }

        const button = document.getElementById('loginButton');
        const captchaCode = document.getElementById('captchaCode');
        const refreshBtn = document.getElementById('refreshCaptcha');
        const messageEl = document.getElementById('message');
        let captchaId = null;

        async function loadCaptcha() {
            try {
                const r = await fetch('/api/auth/captcha');
                if (!r.ok) throw new Error();
                const j = await r.json();
                captchaId = j.id;
                captchaCode.textContent = j.question;
                document.getElementById('captchaAnswer').value = '';
            } catch (e) { captchaId = null; }
        }

        loadCaptcha();
        refreshBtn.addEventListener('click', e => { e.preventDefault(); loadCaptcha(); });

        function saveSessionAndRedirect(body) {
            localStorage.setItem('megaSoatToken', body.token);
            localStorage.setItem('megaSoatUser', body.email);
            showMsg('✓ Acceso concedido', 'success');
            setTimeout(() => { window.location.href = getLandingPage(body.token); }, 500);
        }

        button.addEventListener('click', async () => {
            messageEl.textContent = '';
            messageEl.className = 'login-message';
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const captchaAnswer = document.getElementById('captchaAnswer').value.trim();
            if (!email || !password) { showMsg('Completa todos los campos', 'error'); return; }
            if (!captchaAnswer) { showMsg('Ingresa el código de verificación', 'error'); return; }

            button.textContent = 'Verificando...';
            button.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, captchaId, captchaAnswer })
                });


                if (!res.ok) {
                    if (res.status === 400) throw new Error('Captcha expirado — toca ↻ Nuevo');
                    if (res.status === 401) throw new Error('Correo o contraseña incorrectos');
                    throw new Error('Error de autenticación');
                }
                saveSessionAndRedirect(await res.json());
            } catch (err) {
                showMsg(err.message || 'Error de autenticación', 'error');
                button.textContent = 'Iniciar sesión';
                button.disabled = false;
                loadCaptcha();
            }
        });



        document.getElementById('password').addEventListener('keyup', e => {
            if (e.key === 'Enter') button.click();
        });

        function showMsg(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'login-message ' + type;
        }
    </script>
</body>

</html>
