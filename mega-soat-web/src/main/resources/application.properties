spring.application.name=MegaSOAT Web - Observatorio Inteligente de Riesgos y Morosidad
server.port=8080
spring.main.allow-bean-definition-overriding=true
# Conexión MySQL: usar UTF-8 compatible con JVM y habilitar useUnicode
spring.datasource.url=jdbc:mysql://localhost:3306/megasoat_web?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Lima&useUnicode=true&characterEncoding=UTF-8
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=none
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
# Usar dialecto genérico MySQL para compatibilidad con la versión de Hibernate incluida
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=mega-soat-secret-key-change-me
jwt.expiration-ms=86400000
spring.websocket.path=/ws
logging.level.org.springframework.security=INFO

# Application feature flags
application.notifications.enabled=true
application.monitoring.enabled=true
